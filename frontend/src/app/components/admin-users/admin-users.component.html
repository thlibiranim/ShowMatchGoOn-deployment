<div class="space-y-6 p-6 max-w-7xl mx-auto">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
      <h1 class="text-3xl text-white mb-2">Users & Loyalty Management</h1>
      <p class="text-gray-400">Manage user accounts, subscriptions, and loyalty rewards</p>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="UsersIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-lg text-white mb-2">Total Users</h3>
      <p class="text-3xl text-white mb-2">12,456</p>
      <p class="text-sm text-green-500">+8% this month</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="TrendingUpIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-lg text-white mb-2">Active Users</h3>
      <p class="text-3xl text-white mb-2">8,234</p>
      <p class="text-sm text-gray-400">Last 30 days</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="AwardIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-lg text-white mb-2">Premium Subscribers</h3>
      <p class="text-3xl text-white mb-2">3,567</p>
      <p class="text-sm text-gray-400">29% conversion</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="UserCogIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-lg text-white mb-2">Loyalty Members</h3>
      <p class="text-3xl text-white mb-2">5,123</p>
      <p class="text-sm text-gray-400">Enrolled in program</p>
    </div>
  </div>

  <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
    <p class="text-gray-400 text-center">User and loyalty management interface</p>
  </div>
</div>
