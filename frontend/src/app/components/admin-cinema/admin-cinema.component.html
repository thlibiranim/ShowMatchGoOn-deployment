<div class="space-y-6 p-6 max-w-7xl mx-auto">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
      <h1 class="text-3xl text-white mb-2">Cinema Partners Portal</h1>
      <p class="text-gray-400">Manage theater partnerships, showtimes, and locations</p>
    </div>
    <button class="flex items-center gap-2 px-4 py-2 bg-[#8B5CF6] hover:bg-[#7C3AED] text-white rounded-lg transition-all">
      <lucide-icon [img]="PlusIcon" class="w-4 h-4"></lucide-icon>
      Add Theater
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="BuildingIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">Partner Theaters</h3>
      <p class="text-3xl text-white mb-2">24</p>
      <p class="text-sm text-gray-400">Active partnerships</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="CalendarIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">Daily Showtimes</h3>
      <p class="text-3xl text-white mb-2">156</p>
      <p class="text-sm text-gray-400">Scheduled today</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="MapPinIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">Coverage Area</h3>
      <p class="text-3xl text-white mb-2">12</p>
      <p class="text-sm text-gray-400">Cities served</p>
    </div>
  </div>

  <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
    <p class="text-gray-400 text-center">Cinema partner management interface</p>
  </div>
</div>
