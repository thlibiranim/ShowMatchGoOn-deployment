<div class="space-y-6 p-6 max-w-7xl mx-auto">
  <div class="text-center py-12">
    <lucide-icon [img]="TicketIcon" class="w-16 h-16 text-[#8B5CF6] mx-auto mb-4"></lucide-icon>
    <h2 class="text-3xl text-white mb-4">Cinema Booking Journey</h2>
    <p class="text-gray-400 max-w-2xl mx-auto">
      Find movies near you, select your perfect seats, and book instantly with QR code tickets.
    </p>
  </div>
  
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="MapPinIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">Find Theaters</h3>
      <p class="text-gray-400">Discover nearby cinemas with available showtimes</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="CalendarIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">Select Seats</h3>
      <p class="text-gray-400">Interactive seating chart for the best view</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="TicketIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">Get Tickets</h3>
      <p class="text-gray-400">Instant QR code tickets on your device</p>
    </div>
  </div>
</div>
