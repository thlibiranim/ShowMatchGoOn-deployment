<div class="space-y-6 p-6 max-w-7xl mx-auto">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
      <h1 class="text-3xl text-white mb-2">Notification Hub</h1>
      <p class="text-gray-400">Manage multi-channel communications and campaigns</p>
    </div>
    <button class="flex items-center gap-2 px-4 py-2 bg-[#8B5CF6] hover:bg-[#7C3AED] text-white rounded-lg transition-all">
      <lucide-icon [img]="SendIcon" class="w-4 h-4"></lucide-icon>
      Send Notification
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="BellIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">Push Notifications</h3>
      <p class="text-3xl text-white mb-2">1,234</p>
      <p class="text-sm text-gray-400">Sent this week</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="MailIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">Email Campaigns</h3>
      <p class="text-3xl text-white mb-2">89%</p>
      <p class="text-sm text-gray-400">Open rate</p>
    </div>
    
    <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
      <lucide-icon [img]="MessageSquareIcon" class="w-10 h-10 text-[#8B5CF6] mb-4"></lucide-icon>
      <h3 class="text-xl text-white mb-2">In-App Messages</h3>
      <p class="text-3xl text-white mb-2">456</p>
      <p class="text-sm text-gray-400">Active campaigns</p>
    </div>
  </div>

  <div class="bg-[#141920] border border-[#8B5CF6]/20 rounded-lg p-6">
    <p class="text-gray-400 text-center">Notification management interface</p>
  </div>
</div>
